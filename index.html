<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mô phỏng Thí nghiệm Rutherford Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <button id="mobile-toggle" aria-label="Toggle Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <aside id="sidebar">
            <button id="close-sidebar" class="mobile-only">✕ Đóng</button>
            
            <div class="header">
                <h1>MÔ PHỎNG THÍ NGHIỆM RUTHERFORD</h1>
                <p>HÓA HỌC ABC</p>
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">Tổng hạt</span>
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-percent" style="visibility: hidden;">0%</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Đi thẳng</span>
                    <span class="stat-value text-blue" id="stat-straight">0</span>
                    <span class="stat-percent text-blue" id="percent-straight">0.0%</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Bị lệch</span>
                    <span class="stat-value text-red" id="stat-scattered">0</span>
                    <span class="stat-percent text-red" id="percent-scattered">0.0%</span>
                </div>
            </div>

            <div class="controls">
                <div class="control-row">
                    <button id="btn-power" class="btn primary">Bật Nguồn</button>
                    <button id="btn-pause" class="btn secondary">Tạm dừng</button>
                    <button id="btn-reset" class="btn secondary">Làm mới</button>
                </div>

                <div class="slider-group">
                    <label for="slider-rate">Tốc độ bắn: <span id="rate-val">TB</span></label>
                    <input type="range" id="slider-rate" min="1" max="10" value="5">
                </div>

                <div class="slider-group">
                    <label for="slider-thickness">Độ dày lá vàng: <span id="thickness-val">Chuẩn</span></label>
                    <input type="range" id="slider-thickness" min="1" max="10" value="5">
                </div>
            </div>
            
            <div class="hints">
                🖱️ Xoay 3D: Chuột trái / Vuốt <br>
                🔍 Zoom: Lăn chuột / Chụm ngón <br>
                🎯 Click vật thể: Xem tên
            </div>
        </aside>

        <main id="canvas-container"></main>
    </div>

    <!-- Nhãn Tooltip hiển thị tên vật thể -->
    <div id="tooltip" class="tooltip"></div>

    <script src="sketch.js"></script>
</body>
</html>
