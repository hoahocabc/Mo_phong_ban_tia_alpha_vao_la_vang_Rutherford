<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mô phỏng Thí nghiệm Rutherford 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Nút mở Menu trên Mobile -->
    <button id="mobile-menu-btn">☰ Điều khiển</button>
    
    <!-- Lớp phủ làm tối màn hình khi mở Menu -->
    <div id="overlay"></div>

    <div id="app-container">
        <!-- Sidebar điều khiển bên trái -->
        <div id="sidebar">
            <button id="close-sidebar-btn" class="mobile-only">✖ Đóng menu</button>

            <div class="sidebar-header">
                <h2>THÍ NGHIỆM RUTHERFORD</h2>
                <h3>HÓA HỌC ABC</h3>
            </div>
            <p class="desc">Mô phỏng tán xạ tia Alpha qua lá vàng mỏng.</p>
            
            <div class="control-group">
                <button id="btn-power" class="btn-power-off">Bật nguồn phát</button>
                <button id="btn-toggle" class="btn-pause">Tạm dừng</button>
            </div>

            <div class="control-group">
                <label>Tốc độ bắn hạt Alpha:</label>
                <input type="range" id="slider-rate" min="0" max="100" value="40">
            </div>

            <div class="instructions">
                <strong>Hướng dẫn:</strong>
                <ul>
                    <li><b>Xoay 3D:</b> Chuột trái hoặc Vuốt 1 ngón.</li>
                    <li><b>Xem tên:</b> Bấm giữ chuột / ngón tay vào đối tượng.</li>
                    <li><b>Thu / Phóng:</b> Con lăn chuột hoặc Zoom 2 ngón.</li>
                </ul>
            </div>
        </div>

        <!-- Vùng chứa Canvas 3D bên phải -->
        <div id="canvas-container">
            <!-- p5.js sẽ chèn canvas vào đây -->
        </div>
    </div>

    <!-- Nhãn hiển thị tên đối tượng -->
    <div id="tooltip"></div>

    <script src="sketch.js"></script>
</body>
</html>
